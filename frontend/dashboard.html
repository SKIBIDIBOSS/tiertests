<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MC Tier Testing</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .queue-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .queue-item {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .accept-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .accept-btn:hover {
            background: #218838;
        }
        .test-session {
            background: #f8f9fa;
            border: 2px solid #667eea;
        }
        .chat-messages {
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .chat-message {
            margin-bottom: 10px;
            padding: 5px;
        }
        .chat-message strong {
            color: #667eea;
        }
        .test-controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">MC Tier Testing</h1>
            <div class="nav-links">
                <a href="index.html">Leaderboard</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="profile.html">Profile</a>
                <a href="forum.html">Forum</a>
                <a href="#" id="adminLink" style="display:none;">Admin Panel</a>
                <a href="#" id="logoutLink">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2>Testing Dashboard</h2>
        
        <!-- Pending Queue Section -->
        <div style="background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px;">
            <h3>📋 Pending Test Requests</h3>
            <div id="queueList" class="queue-list">
                <p>Loading queue...</p>
            </div>
        </div>

        <!-- Active Test Session -->
        <div style="background: white; border-radius: 10px; padding: 20px;">
            <h3>🎮 Active Test Session</h3>
            <div id="activeTestSection" style="display: none;">
                <div id="testInfo" style="background: #e3f2fd; padding: 10px; border-radius: 5px; margin-bottom: 15px;"></div>
                <div class="chat-messages" id="testChatMessages"></div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="testChatInput" placeholder="Type message to tester..." style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                    <button id="sendTestChatBtn" class="submit-btn" style="width: auto; padding: 8px 20px;">Send</button>
                </div>
                <div class="test-controls">
                    <button id="completeTestBtn" class="submit-btn" style="background: #28a745;">Complete Test</button>
                </div>
            </div>
            <div id="noActiveTest" style="text-align: center; padding: 40px; color: #999;">
                No active test session. Accept a test request to begin.
            </div>
        </div>
    </div>

    <!-- Submit Results Modal -->
    <div id="resultModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Submit Test Results</h2>
            <form id="resultForm">
                <div class="form-group">
                    <label>Tester Score (X):</label>
                    <input type="number" id="testerScore" required>
                </div>
                <div class="form-group">
                    <label>Testee Score (Y):</label>
                    <input type="number" id="testeeScore" required>
                </div>
                <div class="form-group">
                    <label>Tester Name:</label>
                    <input type="text" id="testerName" required>
                </div>
                <div class="form-group">
                    <label>Testee Name:</label>
                    <input type="text" id="testeeName" required>
                </div>
                <div class="form-group">
                    <label>Testee IGN:</label>
                    <input type="text" id="testeeIgn" required>
                </div>
                <div class="form-group">
                    <label>Server Tested On:</label>
                    <input type="text" id="server" placeholder="e.g., US, EU, ASIA" required>
                </div>
                <button type="submit" class="submit-btn">Submit Results</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        let socket = null;
        let currentUser = null;
        let currentTestId = null;
        let currentQueueId = null;

        // Check authentication
        async function checkAuth() {
            try {
                const response = await fetch('/api/check-auth');
                const data = await response.json();
                
                if (data.authenticated) {
                    currentUser = data;
                    document.getElementById('logoutLink').style.display = 'inline';
                    if (data.isAdmin) {
                        document.getElementById('adminLink').style.display = 'inline';
                    }
                    connectSocket();
                    loadQueue();
                } else {
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.error('Auth error:', error);
                window.location.href = 'index.html';
            }
        }

        // Connect socket for real-time chat
        function connectSocket() {
            socket = io();
            
            socket.on('connect', () => {
                console.log('Socket connected');
            });
            
            socket.on('test-message', (data) => {
                addTestMessage(data);
            });
            
            socket.on('test-accepted', (data) => {
                console.log('Test accepted:', data);
                if (data.testId) {
                    currentTestId = data.testId;
                    loadTestMessages(currentTestId);
                    showActiveTest(data);
                }
            });
        }

        // Load pending queue
        async function loadQueue() {
            try {
                const response = await fetch('/api/queue');
                const queue = await response.json();
                displayQueue(queue);
            } catch (error) {
                console.error('Error loading queue:', error);
            }
        }

        // Display queue
        function displayQueue(queue) {
            const queueDiv = document.getElementById('queueList');
            if (queue.length === 0) {
                queueDiv.innerHTML = '<p>No pending test requests</p>';
                return;
            }
            
            queueDiv.innerHTML = queue.map(entry => `
                <div class="queue-item">
                    <div>
                        <strong>${entry.queue_username || entry.username}</strong><br>
                        IGN: ${entry.ign}<br>
                        Server: ${entry.preferred_server} | Timezone: ${entry.timezone}
                    </div>
                    <button class="accept-btn" onclick="acceptTest(${entry.id})">Accept Test</button>
                </div>
            `).join('');
        }

        // Accept test
        window.acceptTest = async function(queueId) {
            try {
                const response = await fetch(`/api/accept-test/${queueId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                if (data.success) {
                    currentTestId = data.testId;
                    currentQueueId = queueId;
                    
                    // Join socket room
                    socket.emit('join-test', data.testId);
                    
                    // Get test details
                    const testResponse = await fetch(`/api/test/details/${data.testId}`);
                    const test = await testResponse.json();
                    
                    showActiveTest(test);
                    loadTestMessages(data.testId);
                    loadQueue(); // Refresh queue
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                console.error('Error accepting test:', error);
                alert('Error accepting test');
            }
        };

        // Show active test section
        function showActiveTest(test) {
            document.getElementById('activeTestSection').style.display = 'block';
            document.getElementById('noActiveTest').style.display = 'none';
            
            const testInfo = document.getElementById('testInfo');
            testInfo.innerHTML = `
                <strong>Testing:</strong> ${test.testee_name || test.testee_username || 'Player'}<br>
                <strong>IGN:</strong> ${test.testee_ign || 'Not set'}<br>
                <strong>Started:</strong> ${new Date(test.started_at).toLocaleString()}
            `;
        }

        // Load test chat messages
        async function loadTestMessages(testId) {
            try {
                const response = await fetch(`/api/test/messages/${testId}`);
                const messages = await response.json();
                
                const chatDiv = document.getElementById('testChatMessages');
                chatDiv.innerHTML = '';
                
                messages.forEach(msg => {
                    addTestMessage(msg);
                });
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        // Add message to test chat
        function addTestMessage(data) {
            const chatDiv = document.getElementById('testChatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'chat-message';
            const time = new Date(data.timestamp).toLocaleTimeString();
            messageDiv.innerHTML = `
                <strong>${data.username}:</strong> ${escapeHtml(data.message)}
                <span style="color: #999; font-size: 10px; margin-left: 10px;">${time}</span>
            `;
            chatDiv.appendChild(messageDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        // Send test message
        async function sendTestMessage() {
            const input = document.getElementById('testChatInput');
            const message = input.value.trim();
            
            if (!message || !currentTestId) return;
            
            try {
                const response = await fetch('/api/test/send-message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        testId: currentTestId,
                        message: message
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    input.value = '';
                    // Emit via socket for real-time
                    socket.emit('test-message', {
                        testId: currentTestId,
                        username: currentUser.username,
                        message: message
                    });
                }
            } catch (error) {
                console.error('Error sending message:', error);
            }
        }

        // Complete test and show result modal
        function completeTest() {
            if (!currentTestId) {
                alert('No active test');
                return;
            }
            document.getElementById('resultModal').style.display = 'block';
        }

        // Submit test results
        async function submitResults(event) {
            event.preventDefault();
            
            const results = {
                testId: currentTestId,
                testerScore: document.getElementById('testerScore').value,
                testeeScore: document.getElementById('testeeScore').value,
                testerName: document.getElementById('testerName').value,
                testeeName: document.getElementById('testeeName').value,
                testeeIgn: document.getElementById('testeeIgn').value,
                server: document.getElementById('server').value
            };
            
            try {
                const response = await fetch('/api/submit-test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(results)
                });
                
                const data = await response.json();
                if (data.success) {
                    alert('Test results submitted successfully!');
                    document.getElementById('resultModal').style.display = 'none';
                    document.getElementById('resultForm').reset();
                    
                    // Reset active test section
                    currentTestId = null;
                    document.getElementById('activeTestSection').style.display = 'none';
                    document.getElementById('noActiveTest').style.display = 'block';
                    document.getElementById('testChatMessages').innerHTML = '';
                    
                    // Refresh queue
                    loadQueue();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                console.error('Error submitting results:', error);
                alert('Error submitting results');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Logout
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = 'index.html';
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            document.getElementById('sendTestChatBtn')?.addEventListener('click', sendTestMessage);
            document.getElementById('testChatInput')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendTestMessage();
                }
            });
            document.getElementById('completeTestBtn')?.addEventListener('click', completeTest);
            document.getElementById('resultForm')?.addEventListener('submit', submitResults);
            document.getElementById('logoutLink')?.addEventListener('click', logout);
            
            // Modal close
            document.querySelectorAll('.close').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.getElementById('resultModal').style.display = 'none';
                });
            });
        });
    </script>
</body>
</html>
