<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Tickets - MC Tier Testing</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050810;
            --bg-secondary: #080d1a;
            --bg-card: #0d1526;
            --bg-elevated: #111e35;
            --border: #1e2d52;
            --border-bright: #2a3f73;
            --accent: #4f8eff;
            --accent-glow: rgba(79,142,255,0.3);
            --gold: #ffd700;
            --red: #ff4444;
            --green: #44ff88;
            --text-primary: #e8eeff;
            --text-secondary: #8a9dc4;
            --text-dim: #4a5a7a;
            --font-display: 'Rajdhani', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
            --font-body: 'Exo 2', sans-serif;
            --role-admin: #ff4444;
            --role-tester: #4f8eff;
            --role-user: #e8eeff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-body); min-height: 100vh; }

        /* Navbar */
        .navbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-logo { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: 3px; color: var(--text-primary); text-decoration: none; }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 4px; align-items: center; }
        .nav-links a {
            color: var(--text-secondary); text-decoration: none;
            font-family: var(--font-display); font-size: 14px; font-weight: 500;
            padding: 6px 14px; border-radius: 6px; transition: all 0.15s;
        }
        .nav-links a:hover { color: var(--text-primary); background: var(--bg-card); }
        .nav-links a.active { color: var(--accent); background: rgba(79,142,255,0.1); }
        .nav-user { display: flex; align-items: center; gap: 10px; }
        .nav-avatar {
            width: 32px; height: 32px; border-radius: 4px;
            background: var(--bg-elevated); border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display); font-weight: 700; color: var(--accent); font-size: 13px;
        }
        .nav-username { font-family: var(--font-display); font-size: 14px; font-weight: 600; }

        /* Layout */
        .tickets-layout {
            display: flex;
            height: calc(100vh - 56px);
        }

        /* Tickets sidebar */
        .tickets-sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .tickets-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .tickets-header h2 {
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        .btn-new-ticket {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            font-family: var(--font-display);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-new-ticket:hover { background: #6aa3ff; }
        .tickets-list { flex: 1; overflow-y: auto; padding: 8px; }
        .ticket-item {
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 4px;
            border: 1px solid transparent;
        }
        .ticket-item:hover { background: var(--bg-card); border-color: var(--border); }
        .ticket-item.active { background: rgba(79,142,255,0.1); border-color: var(--accent); }
        .ticket-item-subject {
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ticket-item-meta {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .status-open { color: var(--gold); }
        .status-closed { color: var(--text-dim); }

        /* Ticket chat view */
        .ticket-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .ticket-view-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .ticket-view-title {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .ticket-view-meta {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
        }
        .btn-close-ticket {
            background: rgba(255,68,68,0.15);
            color: var(--red);
            border: 1px solid rgba(255,68,68,0.3);
            padding: 6px 16px;
            border-radius: 4px;
            font-family: var(--font-display);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-close-ticket:hover { background: rgba(255,68,68,0.25); }

        /* Chat messages */
        .ticket-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-msg {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .chat-avatar {
            width: 36px; height: 36px; border-radius: 4px;
            background: var(--bg-elevated); border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display); font-weight: 700; font-size: 14px;
            flex-shrink: 0;
        }
        .chat-avatar.admin { border-color: var(--role-admin); color: var(--role-admin); }
        .chat-avatar.tester { border-color: var(--role-tester); color: var(--role-tester); }
        .chat-body { flex: 1; }
        .chat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .chat-username {
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
        }
        .chat-username.admin { color: var(--role-admin); }
        .chat-username.tester { color: var(--role-tester); }
        .chat-username.user { color: var(--role-user); }
        .role-badge {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 2px;
        }
        .role-badge.admin { background: rgba(255,68,68,0.15); color: var(--role-admin); border: 1px solid rgba(255,68,68,0.3); }
        .role-badge.tester { background: rgba(79,142,255,0.15); color: var(--role-tester); border: 1px solid rgba(79,142,255,0.3); }
        .chat-time { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }
        .chat-content { font-size: 14px; color: var(--text-primary); line-height: 1.6; }

        /* System message */
        .system-msg {
            text-align: center;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
            padding: 8px;
            background: var(--bg-elevated);
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        /* Message input */
        .ticket-input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .ticket-input {
            flex: 1;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 14px;
            outline: none;
            resize: none;
            min-height: 42px;
            max-height: 120px;
            transition: border-color 0.2s;
        }
        .ticket-input:focus { border-color: var(--accent); }
        .ticket-input::placeholder { color: var(--text-dim); }
        .ticket-input:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-send {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-send:hover { background: #6aa3ff; }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Empty state */
        .empty-ticket-view {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            color: var(--text-dim);
        }
        .empty-ticket-view .icon { font-size: 48px; }
        .empty-ticket-view p { font-family: var(--font-mono); font-size: 13px; }

        /* Auth required */
        .auth-required {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            color: var(--text-dim);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.open { display: flex; }
        .modal-box {
            background: var(--bg-card);
            border: 1px solid var(--border-bright);
            border-radius: 12px;
            padding: 28px;
            width: 100%;
            max-width: 560px;
            position: relative;
        }
        .modal-title {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .modal-close {
            position: absolute; top: 16px; right: 16px;
            background: none; border: none; color: var(--text-dim);
            font-size: 20px; cursor: pointer;
        }
        .modal-close:hover { color: var(--text-primary); }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-size: 11px; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px;
            font-family: var(--font-mono);
        }
        .form-input {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input:focus { border-color: var(--accent); }
        .form-input::placeholder { color: var(--text-dim); }
        textarea.form-input { resize: vertical; min-height: 100px; }
        .btn-primary {
            background: var(--accent); color: #fff; border: none;
            padding: 10px 24px; border-radius: 4px;
            font-family: var(--font-display); font-size: 15px; font-weight: 600;
            letter-spacing: 1px; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary:hover { background: #6aa3ff; }
        .btn-ghost {
            background: transparent; color: var(--text-secondary);
            border: 1px solid var(--border-bright); padding: 10px 20px;
            border-radius: 4px; font-family: var(--font-display); font-size: 14px;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
        .error-msg { color: var(--red); font-size: 13px; font-family: var(--font-mono); padding: 8px 12px; background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3); border-radius: 4px; margin-top: 8px; }
        .success-msg { color: var(--green); font-size: 13px; font-family: var(--font-mono); padding: 8px 12px; background: rgba(68,255,136,0.1); border: 1px solid rgba(68,255,136,0.3); border-radius: 4px; margin-top: 8px; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">MC<span>TIER</span>TEST</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="forum.html">Forum</a>
            <a href="tickets.html" class="active">Tickets</a>
            <a href="profile.html">Profile</a>
            <a href="admin.html" id="adminNavLink" style="display:none">Admin</a>
        </div>
        <div class="nav-user" id="navUser" style="display:none">
            <div class="nav-avatar" id="navAvatar">?</div>
            <span class="nav-username" id="navUsername"></span>
            <a href="#" onclick="doLogout()" style="color:var(--text-dim);font-size:13px;font-family:var(--font-mono);text-decoration:none;margin-left:8px;">logout</a>
        </div>
    </nav>

    <div class="tickets-layout" id="ticketsLayout">
        <!-- Auth required state -->
        <div class="auth-required" id="authRequired">
            <div style="font-size:48px">🎫</div>
            <p style="font-family:var(--font-mono);font-size:13px;color:var(--text-dim)">You must be logged in to view tickets</p>
            <a href="index.html" style="background:var(--accent);color:#fff;padding:10px 24px;border-radius:4px;text-decoration:none;font-family:var(--font-display);font-weight:600;font-size:15px;">Login</a>
        </div>

        <!-- Tickets sidebar (hidden until auth) -->
        <div class="tickets-sidebar" id="ticketsSidebar" style="display:none">
            <div class="tickets-header">
                <h2>🎫 Tickets</h2>
                <button class="btn-new-ticket" onclick="openNewTicketModal()">+ New</button>
            </div>
            <div class="tickets-list" id="ticketsList">
                <div style="padding:20px;text-align:center;color:var(--text-dim);font-family:var(--font-mono);font-size:12px;">Loading tickets...</div>
            </div>
        </div>

        <!-- Ticket view (hidden until auth) -->
        <div class="ticket-view" id="ticketView" style="display:none">
            <div class="empty-ticket-view" id="emptyTicketView">
                <div class="icon">🎫</div>
                <p>Select a ticket to view it</p>
                <p style="margin-top:4px;font-size:11px;">or create a new support ticket</p>
            </div>
            <div id="ticketContent" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
                <div class="ticket-view-header">
                    <div>
                        <div class="ticket-view-title" id="tvSubject"></div>
                        <div class="ticket-view-meta" id="tvMeta"></div>
                    </div>
                    <button class="btn-close-ticket" id="closeTicketBtn" onclick="closeCurrentTicket()" style="display:none">✕ Close Ticket</button>
                </div>
                <div class="ticket-messages" id="ticketMessages"></div>
                <div class="ticket-input-area" id="ticketInputArea">
                    <textarea class="ticket-input" id="ticketMsgInput" placeholder="Type a message..." rows="1"
                        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendTicketMessage();}"></textarea>
                    <button class="btn-send" id="ticketSendBtn" onclick="sendTicketMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- New Ticket Modal -->
    <div class="modal" id="newTicketModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('newTicketModal')">×</button>
            <div class="modal-title">New Support Ticket</div>
            <div class="form-group">
                <label>Subject</label>
                <input class="form-input" type="text" id="ticketSubject" placeholder="Brief description of your issue...">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea class="form-input" id="ticketMessage" placeholder="Describe your issue in detail..."></textarea>
            </div>
            <div id="ticketError"></div>
            <div style="display:flex;gap:10px;margin-top:16px;">
                <button class="btn-ghost" style="flex:1" onclick="closeModal('newTicketModal')">Cancel</button>
                <button class="btn-primary" style="flex:2" onclick="submitNewTicket()">Submit Ticket</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        let currentUser = null;
        let currentTicketId = null;
        let socket = null;
        let allTickets = [];

        // ── Init ──────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
        });

        async function checkAuth() {
            try {
                const res = await fetch('/api/check-auth');
                const data = await res.json();
                if (data.authenticated) {
                    currentUser = data;
                    document.getElementById('navUser').style.display = 'flex';
                    document.getElementById('navAvatar').textContent = data.username[0].toUpperCase();
                    document.getElementById('navUsername').textContent = data.username;
                    if (data.isAdmin) document.getElementById('adminNavLink').style.display = 'inline';

                    // Show tickets UI
                    document.getElementById('authRequired').style.display = 'none';
                    document.getElementById('ticketsSidebar').style.display = 'flex';
                    document.getElementById('ticketView').style.display = 'flex';

                    await loadTickets();
                    initSocket();
                }
            } catch (e) {}
        }

        function initSocket() {
            socket = io();
            socket.on('ticket-message', (msg) => {
                if (msg.ticket_id == currentTicketId) {
                    appendMessage(msg);
                }
            });
            socket.on('ticket-closed', (data) => {
                if (data.ticketId == currentTicketId) {
                    const ticket = allTickets.find(t => t.id == currentTicketId);
                    if (ticket) ticket.status = 'closed';
                    renderTicketsList();
                    updateTicketClosedState();
                }
            });
        }

        // ── Tickets ───────────────────────────────────────────────────────
        async function loadTickets() {
            try {
                const res = await fetch('/api/tickets');
                allTickets = await res.json();
                renderTicketsList();
            } catch (e) {
                document.getElementById('ticketsList').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim);font-family:var(--font-mono);font-size:12px;">Failed to load tickets</div>';
            }
        }

        function renderTicketsList() {
            const el = document.getElementById('ticketsList');
            if (allTickets.length === 0) {
                el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim);font-family:var(--font-mono);font-size:12px;">No tickets yet</div>';
                return;
            }
            el.innerHTML = allTickets.map(t => {
                const isActive = t.id == currentTicketId ? 'active' : '';
                const statusClass = t.status === 'open' ? 'status-open' : 'status-closed';
                return `
                    <div class="ticket-item ${isActive}" onclick="openTicket(${t.id})">
                        <div class="ticket-item-subject">${escHtml(t.subject)}</div>
                        <div class="ticket-item-meta">
                            <span class="${statusClass}">${t.status.toUpperCase()}</span>
                            <span>·</span>
                            <span>${timeAgo(t.created_at)}</span>
                            ${currentUser.isAdmin ? `<span>· ${escHtml(t.username)}</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function openTicket(ticketId) {
            currentTicketId = ticketId;
            renderTicketsList();
            if (socket) socket.emit('join-ticket', ticketId);
            try {
                const res = await fetch(`/api/ticket/${ticketId}/messages`);
                const ticket = await res.json();
                renderTicket(ticket);
            } catch (e) {}
        }

        function renderTicket(ticket) {
            document.getElementById('emptyTicketView').style.display = 'none';
            const tc = document.getElementById('ticketContent');
            tc.style.display = 'flex';
            tc.style.flexDirection = 'column';
            tc.style.overflow = 'hidden';
            tc.style.flex = '1';

            document.getElementById('tvSubject').textContent = ticket.subject;
            document.getElementById('tvMeta').textContent = `By ${ticket.username} · ${new Date(ticket.created_at).toLocaleDateString()} · Status: ${ticket.status.toUpperCase()}`;

            const closeBtn = document.getElementById('closeTicketBtn');
            const input = document.getElementById('ticketMsgInput');
            const sendBtn = document.getElementById('ticketSendBtn');

            if (ticket.status === 'open') {
                closeBtn.style.display = 'block';
                input.disabled = false;
                sendBtn.disabled = false;
                input.placeholder = 'Type a message...';
            } else {
                closeBtn.style.display = 'none';
                input.disabled = true;
                sendBtn.disabled = true;
                input.placeholder = 'This ticket is closed';
            }

            const msgArea = document.getElementById('ticketMessages');
            msgArea.innerHTML = '';

            // Show original message as first entry
            appendMessage({
                username: ticket.username,
                is_admin: 0,
                is_tester: 0,
                message: ticket.message,
                created_at: ticket.created_at
            });

            (ticket.messages || []).forEach(m => appendMessage(m));
            msgArea.scrollTop = msgArea.scrollHeight;
        }

        function appendMessage(msg) {
            const area = document.getElementById('ticketMessages');
            const roleClass = msg.is_admin ? 'admin' : msg.is_tester ? 'tester' : 'user';
            const div = document.createElement('div');
            div.className = 'chat-msg';
            div.innerHTML = `
                <div class="chat-avatar ${roleClass}">${(msg.username||'?')[0].toUpperCase()}</div>
                <div class="chat-body">
                    <div class="chat-header">
                        <span class="chat-username ${roleClass}">${escHtml(msg.username)}</span>
                        ${roleClass !== 'user' ? `<span class="role-badge ${roleClass}">${roleClass}</span>` : ''}
                        <span class="chat-time">${timeAgo(msg.created_at)}</span>
                    </div>
                    <div class="chat-content">${escHtml(msg.message)}</div>
                </div>
            `;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        function updateTicketClosedState() {
            document.getElementById('closeTicketBtn').style.display = 'none';
            const input = document.getElementById('ticketMsgInput');
            const sendBtn = document.getElementById('ticketSendBtn');
            input.disabled = true;
            sendBtn.disabled = true;
            input.placeholder = 'This ticket is closed';

            const area = document.getElementById('ticketMessages');
            const div = document.createElement('div');
            div.className = 'system-msg';
            div.textContent = '🔒 This ticket has been closed';
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;

            // Update meta
            const ticket = allTickets.find(t => t.id == currentTicketId);
            if (ticket) {
                document.getElementById('tvMeta').textContent = `By ${ticket.username} · Status: CLOSED`;
            }
        }

        async function sendTicketMessage() {
            if (!currentUser || !currentTicketId) return;
            const input = document.getElementById('ticketMsgInput');
            const message = input.value.trim();
            if (!message) return;
            try {
                const res = await fetch(`/api/ticket/${currentTicketId}/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                if (data.success) {
                    input.value = '';
                }
            } catch (e) {}
        }

        async function closeCurrentTicket() {
            if (!currentTicketId) return;
            if (!confirm('Close this ticket? This cannot be undone.')) return;
            try {
                const res = await fetch(`/api/ticket/${currentTicketId}/close`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    const ticket = allTickets.find(t => t.id == currentTicketId);
                    if (ticket) ticket.status = 'closed';
                    renderTicketsList();
                    updateTicketClosedState();
                }
            } catch (e) {}
        }

        // ── New Ticket Modal ──────────────────────────────────────────────
        function openNewTicketModal() {
            document.getElementById('ticketSubject').value = '';
            document.getElementById('ticketMessage').value = '';
            document.getElementById('ticketError').innerHTML = '';
            openModal('newTicketModal');
        }

        async function submitNewTicket() {
            const subject = document.getElementById('ticketSubject').value.trim();
            const message = document.getElementById('ticketMessage').value.trim();
            const errEl = document.getElementById('ticketError');
            if (!subject || !message) { errEl.innerHTML = '<div class="error-msg">Subject and message are required</div>'; return; }
            try {
                const res = await fetch('/api/ticket/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ subject, message })
                });
                const data = await res.json();
                if (data.success) {
                    closeModal('newTicketModal');
                    await loadTickets();
                    openTicket(data.ticketId);
                } else {
                    errEl.innerHTML = `<div class="error-msg">${data.error}</div>`;
                }
            } catch (e) {
                errEl.innerHTML = '<div class="error-msg">Failed to create ticket</div>';
            }
        }

        // ── Helpers ───────────────────────────────────────────────────────
        function openModal(id) { document.getElementById(id).classList.add('open'); }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }
        document.addEventListener('click', e => { if (e.target.classList.contains('modal')) e.target.classList.remove('open'); });

        function escHtml(str) {
            const d = document.createElement('div');
            d.textContent = str || '';
            return d.innerHTML;
        }

        function timeAgo(dateStr) {
            const diff = Date.now() - new Date(dateStr).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return `${mins}m ago`;
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return `${hrs}h ago`;
            const days = Math.floor(hrs / 24);
            return `${days}d ago`;
        }

        async function doLogout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
