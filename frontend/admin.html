<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MC Tier Testing</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .admin-section h3 {
            margin-bottom: 15px;
            color: #333;
        }
        .user-list, .queue-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .user-item, .queue-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: white;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        .tier-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }
        .tier-input {
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        .admin-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        .admin-btn-danger {
            background: #dc3545;
        }
        .admin-btn-warning {
            background: #ffc107;
            color: #333;
        }
        .admin-btn-success {
            background: #28a745;
        }
        .search-box {
            margin-bottom: 15px;
            padding: 8px;
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 600px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">MC Tier Testing - Admin Panel</h1>
            <div class="nav-links">
                <a href="index.html">Leaderboard</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="profile.html">Profile</a>
                <a href="forum.html">Forum</a>
                <a href="admin.html">Admin Panel</a>
                <a href="#" id="logoutLink">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2>Admin Management Dashboard</h2>
        
        <!-- User Management Section -->
        <div class="admin-section">
            <h3>👥 User Management</h3>
            <input type="text" id="userSearch" class="search-box" placeholder="Search users...">
            <div id="userList" class="user-list">Loading users...</div>
        </div>

        <!-- Queue Management Section -->
        <div class="admin-section">
            <h3>📋 Queue Management</h3>
            <button class="admin-btn admin-btn-danger" id="clearAllQueueBtn">Clear Entire Queue</button>
            <div id="queueList" class="queue-list">Loading queue...</div>
        </div>

        <!-- Tier Management Section -->
        <div class="admin-section">
            <h3>⭐ Tier Management</h3>
            <div>
                <label>Select User:</label>
                <select id="tierUserSelect">
                    <option value="">Select a user...</option>
                </select>
            </div>
            <div class="tier-inputs">
                <div>
                    <label>Sumo:</label>
                    <select id="editSumoTier" class="tier-input">
                        <option>Unrated</option><option>LT3</option><option>LT2</option><option>LT1</option>
                        <option>HT3</option><option>HT2</option><option>HT1</option>
                    </select>
                </div>
                <div>
                    <label>Bedfight:</label>
                    <select id="editBedfightTier" class="tier-input">
                        <option>Unrated</option><option>LT3</option><option>LT2</option><option>LT1</option>
                        <option>HT3</option><option>HT2</option><option>HT1</option>
                    </select>
                </div>
                <div>
                    <label>Classic:</label>
                    <select id="editClassicTier" class="tier-input">
                        <option>Unrated</option><option>LT3</option><option>LT2</option><option>LT1</option>
                        <option>HT3</option><option>HT2</option><option>HT1</option>
                    </select>
                </div>
                <div>
                    <label>Skywars:</label>
                    <select id="editSkywarsTier" class="tier-input">
                        <option>Unrated</option><option>LT3</option><option>LT2</option><option>LT1</option>
                        <option>HT3</option><option>HT2</option><option>HT1</option>
                    </select>
                </div>
                <div>
                    <label>Boxing:</label>
                    <select id="editBoxingTier" class="tier-input">
                        <option>Unrated</option><option>LT3</option><option>LT2</option><option>LT1</option>
                        <option>HT3</option><option>HT2</option><option>HT1</option>
                    </select>
                </div>
            </div>
            <button class="admin-btn" id="updateTierBtn">Update Tiers</button>
            <div id="tierUpdateResult"></div>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="editUserModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Edit User</h2>
            <div id="editUserContent"></div>
        </div>
    </div>

    <!-- Password Reset Modal -->
    <div id="passwordResetModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Reset User Password</h2>
            <div class="form-group">
                <label>Username:</label>
                <input type="text" id="resetUsername" readonly>
            </div>
            <div class="form-group">
                <label>New Password:</label>
                <input type="text" id="newPassword" value="newpassword123">
            </div>
            <button class="admin-btn" id="confirmResetBtn">Reset Password</button>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
